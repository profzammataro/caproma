<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mappa CAP di Roma</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C8902A;
    --gold-lt: #E8B84B;
    --red: #9B2335;
    --bg: #111009;
    --bg2: #1C1A14;
    --border: rgba(200,144,42,0.22);
    --text: #F0EAD6;
    --dim: #7A7060;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  header {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    padding: 0.7rem 1.2rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
    z-index: 20;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    white-space: nowrap;
  }
  .logo span { color: var(--gold); }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 480px;
  }

  #searchInput {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.55rem 2.4rem 0.55rem 2.5rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #searchInput:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(200,144,42,0.13);
  }
  #searchInput::placeholder { color: var(--dim); }

  .s-icon {
    position: absolute; left: 0.7rem; top: 50%;
    transform: translateY(-50%);
    color: var(--gold); font-size: 1rem; pointer-events: none;
  }
  #clearBtn {
    position: absolute; right: 0.6rem; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; color: var(--dim);
    cursor: pointer; font-size: 1rem; display: none; line-height:1;
  }
  #clearBtn.on { display: block; }

  /* Dropdown suggestions */
  #suggestions {
    position: absolute;
    top: calc(100% + 4px); left: 0; right: 0;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  #suggestions.on { display: block; }
  .sug-item {
    padding: 0.5rem 0.8rem;
    cursor: pointer;
    display: flex; gap: 0.8rem; align-items: center;
    border-bottom: 1px solid rgba(200,144,42,0.08);
    transition: background 0.12s;
  }
  .sug-item:last-child { border-bottom: none; }
  .sug-item:hover, .sug-item.active { background: rgba(200,144,42,0.1); }
  .sug-cap {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    color: var(--gold-lt);
    min-width: 52px;
  }
  .sug-zone {
    font-size: 0.78rem;
    color: var(--dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Info pill */
  #infoPill {
    display: none;
    align-items: center;
    gap: 0.6rem;
    background: rgba(200,144,42,0.15);
    border: 1px solid rgba(200,144,42,0.4);
    border-radius: 20px;
    padding: 0.3rem 0.9rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #infoPill.on { display: flex; }
  #infoPill strong { color: var(--gold-lt); font-size: 1rem; }

  .count-badge {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--dim);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── MAP AREA ── */
  .map-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #0a0908;
    cursor: grab;
  }
  .map-container.dragging { cursor: grabbing; }

  #mapImg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    object-position: center;
    user-select: none;
    -webkit-user-drag: none;
    transform-origin: 0 0;
  }

  #mapCanvas {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    width: 100%; height: 100%;
  }

  /* Zoom controls */
  .zoom-ctrl {
    position: absolute;
    bottom: 1.2rem; right: 1.2rem;
    display: flex; flex-direction: column; gap: 4px;
    z-index: 10;
  }
  .zoom-btn {
    width: 36px; height: 36px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--gold);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .zoom-btn:hover { background: rgba(200,144,42,0.15); }

  /* Reset btn */
  #resetBtn {
    position: absolute;
    bottom: 1.2rem; left: 1.2rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    z-index: 10;
    transition: all 0.15s;
    display: none;
  }
  #resetBtn.on { display: block; }
  #resetBtn:hover { color: var(--text); border-color: var(--gold); }

  /* Mobile hint */
  .hint {
    position: absolute;
    bottom: 1.2rem; left: 50%; transform: translateX(-50%);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    color: var(--dim);
    letter-spacing: 0.08em;
    pointer-events: none;
    z-index: 5;
    white-space: nowrap;
  }

  @media (max-width: 600px) {
    header { flex-wrap: wrap; gap: 0.6rem; padding: 0.6rem; }
    .logo { font-size: 1rem; }
    .count-badge { display: none; }
    #infoPill { font-size: 0.72rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">CAP <span>Roma</span></div>

  <div class="search-wrap">
    <span class="s-icon">⌕</span>
    <input id="searchInput" type="text" autocomplete="off" spellcheck="false"
      placeholder="Cerca CAP o quartiere…">
    <button id="clearBtn">✕</button>
    <div id="suggestions"></div>
  </div>

  <div id="infoPill">
    <strong id="pillCap"></strong>
    <span id="pillZone"></span>
  </div>

  <div class="count-badge" id="countBadge">84 CAP · 15 Municipi</div>
</header>

<div class="map-container" id="mapContainer">
  <img id="mapImg"
    src="mappa_cap_roma.jpg"
    alt="Mappa CAP Roma"
    draggable="false">
  <canvas id="mapCanvas"></canvas>

  <div class="zoom-ctrl">
    <button class="zoom-btn" id="zoomIn">+</button>
    <button class="zoom-btn" id="zoomOut">−</button>
  </div>

  <button id="resetBtn">↺ Reset</button>
  <div class="hint" id="mapHint">Scorri o pizzica per zoomare · Trascina per spostarti</div>
</div>

// ─────────────────────────────────────────────
// IMAGE + CANVAS SETUP
// ─────────────────────────────────────────────
const container = document.getElementById('mapContainer');
const img       = document.getElementById('mapImg');
const canvas    = document.getElementById('mapCanvas');
const ctx       = canvas.getContext('2d');

const IMG_W = 8268, IMG_H = 5907; // native image size

let scale = 1, offsetX = 0, offsetY = 0;
let isDragging = false, dragStartX, dragStartY, dragOffX, dragOffY;
let highlighted = null;
let animFrame = null;
let pulseT = 0;

function getImgRect() {
  // object-fit: contain inside container
  const cw = container.clientWidth, ch = container.clientHeight;
  const ratio = Math.min(cw / IMG_W, ch / IMG_H);
  const iw = IMG_W * ratio, ih = IMG_H * ratio;
  const ix = (cw - iw) / 2, iy = (ch - ih) / 2;
  return { ix, iy, iw, ih, ratio };
}

function resizeCanvas() {
  canvas.width  = container.clientWidth;
  canvas.height = container.clientHeight;
  drawHighlight();
}

function pctToCanvas(xPct, yPct) {
  const { ix, iy, iw, ih } = getImgRect();
  return {
    x: ix + (xPct / 100) * iw * scale + offsetX,
    y: iy + (yPct / 100) * ih * scale + offsetY
  };
}

function drawHighlight() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!highlighted) return;

  const { ix, iy, iw, ih } = getImgRect();
  const cx = ix + (highlighted.x / 100) * iw * scale + offsetX;
  const cy = iy + (highlighted.y / 100) * ih * scale + offsetY;

  const baseR = Math.max(28, 36 * scale);
  const pulse = Math.sin(pulseT * 0.06) * 0.3 + 0.7;

  // Outer glow rings
  for (let i = 3; i >= 1; i--) {
    ctx.beginPath();
    ctx.arc(cx, cy, baseR * (1 + i * 0.45) * pulse, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(200,144,42,${0.15 / i})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Filled circle
  ctx.beginPath();
  ctx.arc(cx, cy, baseR, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(200,144,42,0.28)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(232,184,75,0.9)';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Cross-hair lines
  const arm = baseR * 1.8;
  ctx.strokeStyle = 'rgba(232,184,75,0.5)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(cx - arm, cy); ctx.lineTo(cx - baseR - 4, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + arm, cy); ctx.lineTo(cx + baseR + 4, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy - arm); ctx.lineTo(cx, cy - baseR - 4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy + arm); ctx.lineTo(cx, cy + baseR + 4); ctx.stroke();
  ctx.setLineDash([]);

  // Label bubble
  const lbl = highlighted.cap;
  ctx.font = `bold ${Math.max(13, 15 * scale)}px 'IBM Plex Mono', monospace`;
  const tw = ctx.measureText(lbl).width;
  const pad = 8, th = Math.max(13, 15 * scale) + 4;
  const bx = cx - tw / 2 - pad;
  const by = cy - baseR - th - pad * 2 - 6;

  // bubble bg
  ctx.beginPath();
  const br = 6;
  ctx.moveTo(bx + br, by);
  ctx.lineTo(bx + tw + pad * 2 - br, by);
  ctx.quadraticCurveTo(bx + tw + pad * 2, by, bx + tw + pad * 2, by + br);
  ctx.lineTo(bx + tw + pad * 2, by + th + pad);
  ctx.quadraticCurveTo(bx + tw + pad * 2, by + th + pad + br, bx + tw + pad * 2 - br, by + th + pad + br);
  // arrow
  const mx = bx + tw / 2 + pad;
  ctx.lineTo(mx + 6, by + th + pad + br);
  ctx.lineTo(mx, cy - baseR - 2);
  ctx.lineTo(mx - 6, by + th + pad + br);
  ctx.lineTo(bx + br, by + th + pad + br);
  ctx.quadraticCurveTo(bx, by + th + pad + br, bx, by + th + pad);
  ctx.lineTo(bx, by + br);
  ctx.quadraticCurveTo(bx, by, bx + br, by);
  ctx.closePath();
  ctx.fillStyle = 'rgba(10,30,60,0.92)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(200,144,42,0.8)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.fillStyle = '#E8B84B';
  ctx.fillText(lbl, cx - tw / 2, by + th + 2);
}

function animate() {
  pulseT++;
  drawHighlight();
  animFrame = requestAnimationFrame(animate);
}

function startAnimate() {
  if (animFrame) cancelAnimationFrame(animFrame);
  animate();
}
function stopAnimate() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
}

// ─────────────────────────────────────────────
// ZOOM & PAN
// ─────────────────────────────────────────────
function clampOffset() {
  const { ix, iy, iw, ih } = getImgRect();
  // Allow pan only within reasonable bounds
  const maxX = iw * (scale - 1) / 2 + iw * 0.1;
  const maxY = ih * (scale - 1) / 2 + ih * 0.1;
  offsetX = Math.max(-maxX, Math.min(maxX, offsetX));
  offsetY = Math.max(-maxY, Math.min(maxY, offsetY));
}

function applyZoom(delta, cx, cy) {
  const oldScale = scale;
  scale = Math.max(1, Math.min(6, scale * (1 + delta)));
  // zoom toward point
  const { ix, iy, iw, ih } = getImgRect();
  const ratio = scale / oldScale;
  offsetX = cx - (cx - offsetX) * ratio;
  offsetY = cy - (cy - offsetY) * ratio;
  // Re-get rect after scale change for clamping
  clampOffset();
  applyTransform();
}

function applyTransform() {
  const { ix, iy } = getImgRect();
  img.style.transformOrigin = '0 0';
  img.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
  drawHighlight();
  document.getElementById('resetBtn').classList.toggle('on', scale > 1.05 || Math.abs(offsetX) > 5 || Math.abs(offsetY) > 5);
}

// Mouse wheel zoom
container.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = container.getBoundingClientRect();
  applyZoom(-e.deltaY * 0.001, e.clientX - rect.left, e.clientY - rect.top);
}, { passive: false });

// Mouse drag
container.addEventListener('mousedown', e => {
  if (scale <= 1) return;
  isDragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  dragOffX = offsetX; dragOffY = offsetY;
  container.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  offsetX = dragOffX + (e.clientX - dragStartX);
  offsetY = dragOffY + (e.clientY - dragStartY);
  clampOffset();
  applyTransform();
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  container.classList.remove('dragging');
});

// Touch pinch/pan
let lastTouches = null;
container.addEventListener('touchstart', e => {
  lastTouches = e.touches;
}, { passive: true });

container.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = container.getBoundingClientRect();
  if (e.touches.length === 2 && lastTouches?.length === 2) {
    const d0 = Math.hypot(lastTouches[0].clientX - lastTouches[1].clientX,
                          lastTouches[0].clientY - lastTouches[1].clientY);
    const d1 = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                          e.touches[0].clientY - e.touches[1].clientY);
    const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
    const my = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
    applyZoom((d1 - d0) / d0 * 0.5, mx, my);
  } else if (e.touches.length === 1 && lastTouches?.length === 1 && scale > 1) {
    offsetX += e.touches[0].clientX - lastTouches[0].clientX;
    offsetY += e.touches[0].clientY - lastTouches[0].clientY;
    clampOffset();
    applyTransform();
  }
  lastTouches = e.touches;
}, { passive: false });

// Zoom buttons
document.getElementById('zoomIn').addEventListener('click', () => {
  applyZoom(0.3, container.clientWidth/2, container.clientHeight/2);
});
document.getElementById('zoomOut').addEventListener('click', () => {
  applyZoom(-0.3, container.clientWidth/2, container.clientHeight/2);
});

// Reset
document.getElementById('resetBtn').addEventListener('click', () => {
  scale = 1; offsetX = 0; offsetY = 0;
  applyTransform();
});

// ─────────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────────
const searchInput  = document.getElementById('searchInput');
const clearBtn     = document.getElementById('clearBtn');
const sugBox       = document.getElementById('suggestions');
const infoPill     = document.getElementById('infoPill');
const pillCap      = document.getElementById('pillCap');
const pillZone     = document.getElementById('pillZone');

let sugActive = -1;

function getSuggestions(q) {
  if (!q || q.length < 2) return [];
  q = q.toLowerCase();
  return CAPS.filter(d =>
    d.cap.startsWith(q) || d.zone.toLowerCase().includes(q)
  ).slice(0, 8);
}

function renderSuggestions(list) {
  sugBox.innerHTML = '';
  sugActive = -1;
  if (!list.length) { sugBox.classList.remove('on'); return; }
  list.forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'sug-item';
    el.innerHTML = `<span class="sug-cap">${d.cap}</span><span class="sug-zone">${d.zone}</span>`;
    el.addEventListener('mousedown', e => { e.preventDefault(); selectCap(d); });
    sugBox.appendChild(el);
  });
  sugBox.classList.add('on');
}

function selectCap(d) {
  highlighted = d;
  searchInput.value = d.cap + ' — ' + d.zone.split(',')[0];
  clearBtn.classList.add('on');
  sugBox.classList.remove('on');
  pillCap.textContent = d.cap;
  pillZone.textContent = d.zone.split(',').slice(0, 2).join(', ');
  infoPill.classList.add('on');
  // Zoom & pan to it
  zoomToCAP(d);
  startAnimate();
}

function zoomToCAP(d) {
  const { ix, iy, iw, ih } = getImgRect();
  const targetScale = 3.2;
  scale = targetScale;
  // Center the CAP
  const capX = ix + (d.x / 100) * iw * scale;
  const capY = iy + (d.y / 100) * ih * scale;
  offsetX = container.clientWidth  / 2 - capX;
  offsetY = container.clientHeight / 2 - capY;
  clampOffset();
  applyTransform();
}

searchInput.addEventListener('input', e => {
  const q = e.target.value.trim();
  clearBtn.classList.toggle('on', q.length > 0);
  if (q.length < 2) {
    sugBox.classList.remove('on');
    return;
  }
  renderSuggestions(getSuggestions(q));
});

searchInput.addEventListener('keydown', e => {
  const items = sugBox.querySelectorAll('.sug-item');
  if (e.key === 'ArrowDown') {
    sugActive = Math.min(sugActive + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === sugActive));
    e.preventDefault();
  } else if (e.key === 'ArrowUp') {
    sugActive = Math.max(sugActive - 1, 0);
    items.forEach((el, i) => el.classList.toggle('active', i === sugActive));
    e.preventDefault();
  } else if (e.key === 'Enter') {
    if (sugActive >= 0) {
      const q = searchInput.value.toLowerCase();
      const list = getSuggestions(q);
      if (list[sugActive]) selectCap(list[sugActive]);
    } else {
      const q = searchInput.value.trim().toLowerCase();
      const list = getSuggestions(q);
      if (list[0]) selectCap(list[0]);
    }
  } else if (e.key === 'Escape') {
    sugBox.classList.remove('on');
    searchInput.blur();
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) sugBox.classList.remove('on');
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.classList.remove('on');
  sugBox.classList.remove('on');
  infoPill.classList.remove('on');
  highlighted = null;
  stopAnimate();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // reset zoom
  scale = 1; offsetX = 0; offsetY = 0;
  applyTransform();
  searchInput.focus();
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
window.addEventListener('resize', () => { resizeCanvas(); applyTransform(); });
img.addEventListener('load', () => { resizeCanvas(); });
resizeCanvas();

// Hide hint after 4s
setTimeout(() => {
  document.getElementById('mapHint').style.opacity = '0';
  document.getElementById('mapHint').style.transition = 'opacity 1s';
}, 4000);
</script>
</body>
</html>

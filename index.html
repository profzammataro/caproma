<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mappa CAP di Roma</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C8902A;
    --gold-lt: #E8B84B;
    --red: #9B2335;
    --bg: #111009;
    --bg2: #1C1A14;
    --border: rgba(200,144,42,0.22);
    --text: #F0EAD6;
    --dim: #7A7060;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  header {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    padding: 0.7rem 1.2rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
    z-index: 20;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    white-space: nowrap;
  }
  .logo span { color: var(--gold); }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 480px;
  }

  #searchInput {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.55rem 2.4rem 0.55rem 2.5rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #searchInput:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(200,144,42,0.13);
  }
  #searchInput::placeholder { color: var(--dim); }

  .s-icon {
    position: absolute; left: 0.7rem; top: 50%;
    transform: translateY(-50%);
    color: var(--gold); font-size: 1rem; pointer-events: none;
  }
  #clearBtn {
    position: absolute; right: 0.6rem; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; color: var(--dim);
    cursor: pointer; font-size: 1rem; display: none; line-height:1;
  }
  #clearBtn.on { display: block; }

  /* Dropdown suggestions */
  #suggestions {
    position: absolute;
    top: calc(100% + 4px); left: 0; right: 0;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  #suggestions.on { display: block; }
  .sug-item {
    padding: 0.5rem 0.8rem;
    cursor: pointer;
    display: flex; gap: 0.8rem; align-items: center;
    border-bottom: 1px solid rgba(200,144,42,0.08);
    transition: background 0.12s;
  }
  .sug-item:last-child { border-bottom: none; }
  .sug-item:hover, .sug-item.active { background: rgba(200,144,42,0.1); }
  .sug-cap {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    color: var(--gold-lt);
    min-width: 52px;
  }
  .sug-zone {
    font-size: 0.78rem;
    color: var(--dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Info pill */
  #infoPill {
    display: none;
    align-items: center;
    gap: 0.6rem;
    background: rgba(200,144,42,0.15);
    border: 1px solid rgba(200,144,42,0.4);
    border-radius: 20px;
    padding: 0.3rem 0.9rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #infoPill.on { display: flex; }
  #infoPill strong { color: var(--gold-lt); font-size: 1rem; }

  .count-badge {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--dim);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── MAP AREA ── */
  .map-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #0a0908;
    cursor: grab;
  }
  .map-container.dragging { cursor: grabbing; }

  #mapCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
  }

  /* Zoom controls */
  .zoom-ctrl {
    position: absolute;
    bottom: 1.2rem; right: 1.2rem;
    display: flex; flex-direction: column; gap: 4px;
    z-index: 10;
  }
  .zoom-btn {
    width: 36px; height: 36px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--gold);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .zoom-btn:hover { background: rgba(200,144,42,0.15); }

  /* Reset btn */
  #resetBtn {
    position: absolute;
    bottom: 1.2rem; left: 1.2rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    z-index: 10;
    transition: all 0.15s;
    display: none;
  }
  #resetBtn.on { display: block; }
  #resetBtn:hover { color: var(--text); border-color: var(--gold); }

  /* Mobile hint */
  .hint {
    position: absolute;
    bottom: 1.2rem; left: 50%; transform: translateX(-50%);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    color: var(--dim);
    letter-spacing: 0.08em;
    pointer-events: none;
    z-index: 5;
    white-space: nowrap;
  }

  @media (max-width: 600px) {
    header { flex-wrap: wrap; gap: 0.6rem; padding: 0.6rem; }
    .logo { font-size: 1rem; }
    .count-badge { display: none; }
    #infoPill { font-size: 0.72rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">CAP <span>Roma</span></div>

  <div class="search-wrap">
    <span class="s-icon">⌕</span>
    <input id="searchInput" type="text" autocomplete="off" spellcheck="false"
      placeholder="Cerca CAP o quartiere…">
    <button id="clearBtn">✕</button>
    <div id="suggestions"></div>
  </div>

  <div id="infoPill">
    <strong id="pillCap"></strong>
    <span id="pillZone"></span>
  </div>

  <div class="count-badge" id="countBadge">84 CAP · 15 Municipi</div>
</header>

<div class="map-container" id="mapContainer">
  <canvas id="mapCanvas"></canvas>

  <div class="zoom-ctrl">
    <button class="zoom-btn" id="zoomIn">+</button>
    <button class="zoom-btn" id="zoomOut">−</button>
  </div>

  <button id="resetBtn">↺ Reset</button>
  <div class="hint" id="mapHint">Scorri o pizzica per zoomare · Trascina per spostarti</div>
</div>

// ─────────────────────────────────────────────
// CANVAS-ONLY ENGINE
// Mappa + highlight disegnati sullo stesso canvas.
// Pan libero senza limiti artificiali.
// ─────────────────────────────────────────────
const container = document.getElementById('mapContainer');
const canvas    = document.getElementById('mapCanvas');
const ctx       = canvas.getContext('2d');

const IMG_W = 8268, IMG_H = 5907;

// Viewport transform: tutto il rendering usa queste
let camX = 0, camY = 0, camScale = 1;

let isDragging = false, dragStartX, dragStartY, dragCamX, dragCamY;
let highlighted = null;
let animFrame = null;
let pulseT = 0;

// Carica immagine una volta sola
const mapImage = new Image();
mapImage.src = 'mappa_cap_roma.jpg';
mapImage.onload = () => { fitMap(); redraw(); };

// ── Helpers coordinate ──────────────────────────────────────
// Converti percentuale immagine → pixel canvas
function imgPctToScreen(xPct, yPct) {
  return {
    x: camX + (xPct / 100) * IMG_W * camScale,
    y: camY + (yPct / 100) * IMG_H * camScale
  };
}

// ── Fit iniziale (contain) ──────────────────────────────────
function fitMap() {
  const cw = canvas.width, ch = canvas.height;
  camScale = Math.min(cw / IMG_W, ch / IMG_H);
  camX = (cw - IMG_W * camScale) / 2;
  camY = (ch - IMG_H * camScale) / 2;
}

// ── Clamp pan: non uscire troppo dall'immagine ──────────────
function clampCam() {
  const iw = IMG_W * camScale, ih = IMG_H * camScale;
  const cw = canvas.width,     ch = canvas.height;
  // Margine: permettiamo di trascinare finché almeno 80px di mappa restano visibili
  const margin = 80;
  camX = Math.min(cw - margin, Math.max(margin - iw, camX));
  camY = Math.min(ch - margin, Math.max(margin - ih, camY));
}

// ── Zoom verso un punto schermo ─────────────────────────────
function zoomAt(screenX, screenY, factor) {
  const newScale = Math.max(fitScaleRef, Math.min(8, camScale * factor));
  const sf = newScale / camScale;
  camX = screenX - (screenX - camX) * sf;
  camY = screenY - (screenY - camY) * sf;
  camScale = newScale;
  clampCam();
  redraw();
  document.getElementById('resetBtn').classList.toggle('on', camScale > fitScaleRef * 1.05);
}

let fitScaleRef = 1;

// ── Disegna tutto ───────────────────────────────────────────
function redraw() {
  canvas.width  = container.clientWidth;
  canvas.height = container.clientHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 1. Mappa
  if (mapImage.complete && mapImage.naturalWidth) {
    ctx.drawImage(mapImage, camX, camY, IMG_W * camScale, IMG_H * camScale);
  }

  // 2. Highlight
  if (!highlighted) return;
  const { x: cx, y: cy } = imgPctToScreen(highlighted.x, highlighted.y);

  const baseR = Math.max(14, 22 * camScale);
  const pulse = Math.sin(pulseT * 0.06) * 0.28 + 0.72;

  // Glow rings
  for (let i = 3; i >= 1; i--) {
    ctx.beginPath();
    ctx.arc(cx, cy, baseR * (1 + i * 0.5) * pulse, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(200,144,42,${0.18 / i})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Cerchio pieno
  ctx.beginPath();
  ctx.arc(cx, cy, baseR, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(200,144,42,0.3)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(232,184,75,0.95)';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Mirino
  const arm = baseR * 1.9;
  ctx.strokeStyle = 'rgba(232,184,75,0.55)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  [[cx-arm, cy, cx-baseR-2, cy],[cx+baseR+2, cy, cx+arm, cy],
   [cx, cy-arm, cx, cy-baseR-2],[cx, cy+baseR+2, cx, cy+arm]].forEach(([x1,y1,x2,y2]) => {
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });
  ctx.setLineDash([]);

  // Bubble label
  const lbl = highlighted.cap;
  const fs = Math.max(11, 13 * camScale);
  ctx.font = `bold ${fs}px 'IBM Plex Mono', monospace`;
  const tw = ctx.measureText(lbl).width;
  const pad = 7, bh = fs + 6;
  const bx = cx - tw/2 - pad;
  const by = cy - baseR - bh - pad*2 - 8;
  const bw = tw + pad*2;
  const mx = cx;

  ctx.beginPath();
  ctx.moveTo(bx+6, by);
  ctx.lineTo(bx+bw-6, by);
  ctx.quadraticCurveTo(bx+bw, by, bx+bw, by+6);
  ctx.lineTo(bx+bw, by+bh+pad);
  ctx.quadraticCurveTo(bx+bw, by+bh+pad+6, bx+bw-6, by+bh+pad+6);
  ctx.lineTo(mx+6, by+bh+pad+6);
  ctx.lineTo(mx, cy-baseR-2);
  ctx.lineTo(mx-6, by+bh+pad+6);
  ctx.lineTo(bx+6, by+bh+pad+6);
  ctx.quadraticCurveTo(bx, by+bh+pad+6, bx, by+bh+pad);
  ctx.lineTo(bx, by+6);
  ctx.quadraticCurveTo(bx, by, bx+6, by);
  ctx.closePath();
  ctx.fillStyle = 'rgba(8,22,50,0.93)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(200,144,42,0.85)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.fillStyle = '#E8B84B';
  ctx.font = `bold ${fs}px 'IBM Plex Mono', monospace`;
  ctx.fillText(lbl, cx - tw/2, by + bh + 1);
}

function animate() {
  pulseT++;
  redraw();
  animFrame = requestAnimationFrame(animate);
}
function startAnimate() { if (animFrame) cancelAnimationFrame(animFrame); animate(); }
function stopAnimate()  { if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; } }

// ── Zoom & Pan ──────────────────────────────────────────────
container.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = container.getBoundingClientRect();
  const factor = e.deltaY < 0 ? 1.12 : 1/1.12;
  zoomAt(e.clientX - rect.left, e.clientY - rect.top, factor);
}, { passive: false });

container.addEventListener('mousedown', e => {
  isDragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  dragCamX = camX; dragCamY = camY;
  container.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  camX = dragCamX + (e.clientX - dragStartX);
  camY = dragCamY + (e.clientY - dragStartY);
  clampCam();
  redraw();
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  container.classList.remove('dragging');
});

// Touch
let lastTouches = null;
container.addEventListener('touchstart', e => { lastTouches = e.touches; }, { passive: true });
container.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = container.getBoundingClientRect();
  if (e.touches.length === 2 && lastTouches?.length === 2) {
    const d0 = Math.hypot(lastTouches[0].clientX-lastTouches[1].clientX, lastTouches[0].clientY-lastTouches[1].clientY);
    const d1 = Math.hypot(e.touches[0].clientX-e.touches[1].clientX,     e.touches[0].clientY-e.touches[1].clientY);
    const mx = (e.touches[0].clientX+e.touches[1].clientX)/2 - rect.left;
    const my = (e.touches[0].clientY+e.touches[1].clientY)/2 - rect.top;
    if (d0 > 0) zoomAt(mx, my, d1/d0);
  } else if (e.touches.length === 1 && lastTouches?.length === 1) {
    camX += e.touches[0].clientX - lastTouches[0].clientX;
    camY += e.touches[0].clientY - lastTouches[0].clientY;
    clampCam();
    redraw();
  }
  lastTouches = e.touches;
}, { passive: false });

document.getElementById('zoomIn').addEventListener('click', () =>
  zoomAt(canvas.width/2, canvas.height/2, 1.35));
document.getElementById('zoomOut').addEventListener('click', () =>
  zoomAt(canvas.width/2, canvas.height/2, 1/1.35));

document.getElementById('resetBtn').addEventListener('click', () => {
  fitMap(); redraw();
  document.getElementById('resetBtn').classList.remove('on');
});

// ── Search ──────────────────────────────────────────────────
const searchInput = document.getElementById('searchInput');
const clearBtn    = document.getElementById('clearBtn');
const sugBox      = document.getElementById('suggestions');
const infoPill    = document.getElementById('infoPill');
const pillCap     = document.getElementById('pillCap');
const pillZone    = document.getElementById('pillZone');
let sugActive = -1;

function getSuggestions(q) {
  if (!q || q.length < 2) return [];
  q = q.toLowerCase();
  return CAPS.filter(d => d.cap.startsWith(q) || d.zone.toLowerCase().includes(q)).slice(0, 8);
}

function renderSuggestions(list) {
  sugBox.innerHTML = ''; sugActive = -1;
  if (!list.length) { sugBox.classList.remove('on'); return; }
  list.forEach(d => {
    const el = document.createElement('div');
    el.className = 'sug-item';
    el.innerHTML = `<span class="sug-cap">${d.cap}</span><span class="sug-zone">${d.zone}</span>`;
    el.addEventListener('mousedown', e => { e.preventDefault(); selectCap(d); });
    sugBox.appendChild(el);
  });
  sugBox.classList.add('on');
}

function selectCap(d) {
  highlighted = d;
  searchInput.value = d.cap + ' — ' + d.zone.split(',')[0];
  clearBtn.classList.add('on');
  sugBox.classList.remove('on');
  pillCap.textContent  = d.cap;
  pillZone.textContent = d.zone.split(',').slice(0,2).join(', ');
  infoPill.classList.add('on');
  zoomToCAP(d);
  startAnimate();
}

function zoomToCAP(d) {
  // Zoom moderato: 1.8x rispetto alla vista intera, max 4x
  const targetScale = Math.min(4, fitScaleRef * 1.8);
  camScale = targetScale;
  const capScreenX = (d.x / 100) * IMG_W * camScale;
  const capScreenY = (d.y / 100) * IMG_H * camScale;
  camX = canvas.width  / 2 - capScreenX;
  camY = canvas.height / 2 - capScreenY;
  clampCam();
  document.getElementById('resetBtn').classList.add('on');
}

searchInput.addEventListener('input', e => {
  const q = e.target.value.trim();
  clearBtn.classList.toggle('on', q.length > 0);
  renderSuggestions(q.length >= 2 ? getSuggestions(q) : []);
});

searchInput.addEventListener('keydown', e => {
  const items = sugBox.querySelectorAll('.sug-item');
  if (e.key === 'ArrowDown') {
    sugActive = Math.min(sugActive+1, items.length-1);
    items.forEach((el,i) => el.classList.toggle('active', i===sugActive));
    e.preventDefault();
  } else if (e.key === 'ArrowUp') {
    sugActive = Math.max(sugActive-1, 0);
    items.forEach((el,i) => el.classList.toggle('active', i===sugActive));
    e.preventDefault();
  } else if (e.key === 'Enter') {
    const q = searchInput.value.trim().toLowerCase();
    const list = getSuggestions(q);
    const pick = sugActive >= 0 ? list[sugActive] : list[0];
    if (pick) selectCap(pick);
  } else if (e.key === 'Escape') {
    sugBox.classList.remove('on'); searchInput.blur();
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) sugBox.classList.remove('on');
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.classList.remove('on');
  sugBox.classList.remove('on');
  infoPill.classList.remove('on');
  highlighted = null;
  stopAnimate();
  fitMap(); redraw();
  document.getElementById('resetBtn').classList.remove('on');
  searchInput.focus();
});

// ── Init ────────────────────────────────────────────────────
function init() {
  canvas.width  = container.clientWidth;
  canvas.height = container.clientHeight;
  fitMap();
  fitScaleRef = camScale;
  if (mapImage.complete) redraw();
}

window.addEventListener('resize', init);
init();

setTimeout(() => {
  const h = document.getElementById('mapHint');
  h.style.transition = 'opacity 1s';
  h.style.opacity = '0';
}, 4000);
</script>
</body>
